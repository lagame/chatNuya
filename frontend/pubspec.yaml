name: chat_app
description: "A modern chat application inspired by ICQ with real-time messaging using Socket.io"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP and networking
  http: ^1.1.0
  socket_io_client: ^2.0.2

  # Image handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # Local storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # UI and design
  cupertino_icons: ^1.0.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Uncomment and update the following section to include custom fonts:
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700
